<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MiLuAssistantDesktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f0f14;
    color: #e0e0e6;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-app-region: drag;
  }
  .container {
    text-align: center;
    -webkit-app-region: no-drag;
  }
  .logo {
    width: 112px;
    height: 84px;
    margin: 0 auto 28px;
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 8px 28px rgba(124, 92, 252, 0.28));
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 8px 28px rgba(124, 92, 252, 0.28)); }
    50% { transform: scale(1.04); filter: drop-shadow(0 12px 36px rgba(124, 92, 252, 0.42)); }
  }
  h1 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  #status {
    font-size: 14px;
    color: #9090a0;
    margin-bottom: 28px;
    min-height: 20px;
    transition: opacity 0.3s;
  }
  .progress-track {
    width: 220px;
    height: 3px;
    margin: 0 auto;
    border-radius: 2px;
    background: rgba(124, 92, 252, 0.15);
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 30%;
    border-radius: 2px;
    background: linear-gradient(90deg, #7c5cfc, #a78bfa);
    animation: slide 1.5s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(430%); }
  }
  .footer {
    position: fixed;
    bottom: 18px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: #555;
  }
</style>
</head>
<body>
  <div class="container">
    <img class="logo" src="../assets/logo.png" alt="MiLu">
    <h1>MiLuAssistantDesktop</h1>
    <p id="status">正在启动...</p>
    <div class="progress-track"><div class="progress-bar"></div></div>
  </div>
  <div class="footer">MiLuAssistantWeb Windows Edition</div>
</body>
</html>
